# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/NEXE-sudo/redrob-ai-candidate-ranking.git"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/NEXE-sudo/redrob-candidate-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "bash run_full_pipeline.sh '[PUB] India_runs_data_and_ai_challenge/India_runs_data_and_ai_challenge/candidates.jsonl' 'ranking_output'"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Pro 2019 Intel" # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8 # Number of CPU cores used
  ram_gb: 16 # Available RAM in GB
  python_version: "3.11.4" # python --version
  os: "macOS 14.2" # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false # Must be false — see compute constraints
  has_network_during_ranking: false # Must be false — no API calls during ranking
  pre_computation_required: true # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0 # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Google Gemini (via Antigravity IDE) and Claude for architectural brainstorming, performance optimization, and rigorous tie-break validation. AI assistants were leveraged to implement edge-case fixes, debug the ranking pipeline, and refine the consulting career classification logic. No candidate data was fed into any LLM during the actual ranking process.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  A robust multi-stage ranking pipeline ensuring high precision and sub-3-minute execution for 100K candidates.

  1. BM25 Retrieval: Fast lexical filtering to the top 5,000.
  2. FAISS Semantic Search: Precomputed MPNet embeddings filter down to the top 1,000.
  3. Cross-Encoder Reranking: MS-MARCO MiniLM applies deep relevance scoring.
  4. Feature Scoring Hub: An advanced heuristic engine that integrates redrob behavioral signals, parsed JD requirements, skill assessments, and career trajectories. Includes sophisticated logic for startup vs. product vs. consulting-only careers.
  5. Stability & Compliance: Strict deterministic tie-breaking (rounded score + candidate ID), non-stackable behavioral bonuses, off-domain assessment damping, and explicit honeypot/trap detection to prevent gaming.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true # I have read submission_spec.md in full
  code_is_original_work: true # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true # I have not coordinated my submission with other teams
  honeypot_check_done: true # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true # I have tested that my reproduce_command runs end-to-end
